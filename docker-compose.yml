version: "3.9"

name: security-course

services:

  # --------------------------------------------------
  # OWASP Juice Shop
  # --------------------------------------------------
  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - dmz

  # --------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------
  postgres:
    build:
      context: ./postgres
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vulnerabledb
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d vulnerabledb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------
  # Redis
  # --------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - internal

  # --------------------------------------------------
  # Vulnerable API
  # Build your own Node.js lab
  # --------------------------------------------------
  vulnerable-api:
    build:
      context: ./vulnerable-api
    container_name: vulnerable-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vulnerabledb
      DB_USER: student
      DB_PASSWORD: student123
      JWT_SECRET: super-secret-jwt
    ports:
      - "8080:8080"
    networks:
      - dmz
      - internal

  # --------------------------------------------------
  # OWASP ZAP
  # --------------------------------------------------
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: zap
    restart: unless-stopped
    ports:
      - "8090:8080"
    command: >
      zap.sh -daemon
      -host 0.0.0.0
      -port 8080
      -config api.disablekey=true
    networks:
      - dmz

  # --------------------------------------------------
  # Nginx Reverse Proxy
  # --------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - juice-shop
      - vulnerable-api
    networks:
      - dmz

  # --------------------------------------------------
  # Grafana
  # --------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring

  # --------------------------------------------------
  # Loki
  # --------------------------------------------------
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # --------------------------------------------------
  # Promtail
  # --------------------------------------------------
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring

  # --------------------------------------------------
  # SonarQube (Instructor / Advanced Labs)
  # --------------------------------------------------
  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped
    profiles:
      - advanced
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
    networks:
      - monitoring

  # --------------------------------------------------
  # MobSF (Mobile Security Weeks)
  # --------------------------------------------------
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    container_name: mobsf
    restart: unless-stopped
    profiles:
      - mobile
    ports:
      - "8000:8000"
    networks:
      - dmz

volumes:
  postgres_data:
  grafana_data:
  sonarqube_data:

networks:
  dmz:
    driver: bridge

  internal:
    driver: bridge

  monitoring:
    driver: bridge