upstream juice_shop {
    server juice-shop:3000;
}

upstream vulnerable_api {
    server vulnerable-api:8080;
}

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://juice_shop;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://vulnerable_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        proxy_pass http://vulnerable_api/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://vulnerable_api/health;
        proxy_set_header Host $host;
    }
}
